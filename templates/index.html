<!DOCTYPE html>
<html>
<head>
    <title>Team To-Do App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">📝 Team To-Do List</h2>

    <form action="/add" method="POST" class="d-flex mb-4">
        <input type="text" name="task" class="form-control me-2" placeholder="Enter task..." required>
        <button class="btn btn-primary">Add</button>
    </form>

    <table class="table table-bordered bg-white">
        <thead>
            <tr>
                <th>#</th>
                <th>Task</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for task in tasks %}
            <tr>
                <td>{{ task[0] }}</td>
                <td>{{ task[1] }}</td>
                <td>
                    {% if task[2] == 'Done' %}
                        <span class="badge bg-success">Done</span>
                    {% else %}
                        <span class="badge bg-warning">Pending</span>
                    {% endif %}
                </td>
                <td>
                    <a href="/complete/{{ task[0] }}" class="btn btn-sm btn-success">✔</a>
                    <a href="/delete/{{ task[0] }}" class="btn btn-sm btn-danger">✖</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
