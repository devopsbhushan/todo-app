<!DOCTYPE html>
<html>
<head>
<title>Tasks</title>
</head>
<body>

<h2>Task Manager</h2>
<a href="/dashboard">Dashboard</a> | <a href="/logout">Logout</a>

<form method="POST" action="/add">
<input name="user" placeholder="Assign User" required>
<input name="task" placeholder="Task" required>
<input name="remark" placeholder="Remark">
<input type="date" name="target" required>
<button>Add</button>
</form>

<table border="1">
<tr>
<th>User</th><th>Task</th><th>Remark</th><th>Date</th><th>Status</th><th>Action</th>
</tr>

{% for t in tasks %}
<tr>
<td>{{t[1]}}</td>
<td>{{t[2]}}</td>
<td>{{t[3]}}</td>
<td>
{% if t[4] < today|string and t[5] != 'Done' %}
<span style="color:red">{{t[4]}} (Overdue)</span>
{% else %}
{{t[4]}}
{% endif %}
</td>
<td>{{t[5]}}</td>
<td>
<a href="/complete/{{t[0]}}">Done</a>
<a href="/delete/{{t[0]}}">Delete</a>
</td>
</tr>
{% endfor %}

</table>

</body>
</html>
